<html>
  <body>
    <p>Hello,</p>
    <p>You have been invited to join <strong>{{ school.name }}</strong> as a <strong>{{ role_display }}</strong>.</p>
    <p>Invited by: {{ inviter.get_full_name|default:inviter.email }}</p>
    <p>

    <p>Thanks,<br>{{ school.name }} Team</p>
  </body>
</html>
